<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png"/>
  <title>Register — StudyMate</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">
      <span class="logo-icon">🌾</span>
      <span class="logo-text">StudyMate</span>
    </a>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px">
    <h2>Join StudyMate 🚀</h2>
    <p class="sub">Free education for every rural student</p>
    <form id="registerForm">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Your full name" required/>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" minlength="6" required/>
      </div>
      <div class="form-group">
        <label for="classLevel">Class / Grade</label>
        <select id="classLevel" required>
          <option value="">Select your class</option>
          <option>Class 1</option><option>Class 2</option><option>Class 3</option>
          <option>Class 4</option><option>Class 5</option><option>Class 6</option>
          <option>Class 7</option><option>Class 8</option><option>Class 9</option>
          <option>Class 10</option><option>Class 11</option><option>Class 12</option>
        </select>
      </div>
      <button type="submit" class="btn-submit">Create Free Account →</button>
    </form>
    <div class="auth-switch">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
</body>
</html>
