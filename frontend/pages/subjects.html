<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subjects — StudyMate</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .subjects-wrapper { max-width: 1100px; margin: 0 auto; padding: 40px 24px 100px; }
    .subject-detail {
      display: grid; grid-template-columns: 280px 1fr; gap: 40px;
      align-items: start;
    }
    .subject-sidebar {
      background: var(--blue-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: sticky; top: 90px;
    }
    .sidebar-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: all 0.2s;
      font-weight: 600; font-size: 0.9rem;
    }
    .sidebar-item:hover, .sidebar-item.active {
      background: rgba(255,107,26,0.1);
      color: var(--saffron);
    }
    .sidebar-item:last-child { border-bottom: none; }
    .s-ico { font-size: 1.4rem; }
    .lessons-list { }
    .lesson-item {
      display: flex; align-items: center; gap: 16px;
      background: var(--blue-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      margin-bottom: 12px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .lesson-item:hover { border-color: rgba(255,107,26,0.3); transform: translateX(4px); }
    .lesson-num {
      width: 36px; height: 36px;
      background: rgba(255,107,26,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--saffron); flex-shrink: 0;
    }
    .lesson-info { flex: 1; }
    .lesson-info h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
    .lesson-info span { font-size: 0.78rem; color: var(--text-muted); }
    .lesson-icon { font-size: 1.2rem; }
    .lesson-done { color: var(--green); }
    .subj-hero {
      background: var(--blue-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 24px;
    }
    .subj-hero-icon { font-size: 4rem; }
    .subj-hero h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; }
    .subj-hero p { color: var(--text-muted); font-size: 0.9rem; }
    .subj-stats { display: flex; gap: 24px; margin-top: 16px; }
    .subj-stat { font-size: 0.8rem; color: var(--text-muted); }
    .subj-stat strong { color: var(--saffron); font-size: 1.1rem; display: block; }
  </style>
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">🌾</span><span class="logo-text">StudyMate</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="subjects.html" class="active">Subjects</a></li>
      <li><a href="quiz.html">Quiz</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="btn-outline">Login</a>
      <a href="register.html" class="btn-primary">Join Free</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <h1>Subjects 📘</h1>
  <p>Browse all subjects — NCERT aligned, available offline</p>
</div>

<div class="subjects-wrapper">
  <div class="subject-detail">
    <div class="subject-sidebar">
      <div class="sidebar-item active" data-subj="math" onclick="loadSubject('math', this)">
        <span class="s-ico">📐</span> Mathematics
      </div>
      <div class="sidebar-item" data-subj="science" onclick="loadSubject('science', this)">
        <span class="s-ico">🔬</span> Science
      </div>
      <!-- <div class="sidebar-item" data-subj="hindi" onclick="loadSubject('hindi', this)">
        <span class="s-ico">📖</span> Hindi
      </div> -->
      <div class="sidebar-item" data-subj="english" onclick="loadSubject('english', this)">
        <span class="s-ico">🔤</span> English
      </div>
      <div class="sidebar-item" data-subj="social" onclick="loadSubject('social', this)">
        <span class="s-ico">🌍</span> Social Studies
      </div>
      <div class="sidebar-item" data-subj="computer" onclick="loadSubject('computer', this)">
        <span class="s-ico">💻</span> Computer Science
      </div>
      <div class="sidebar-item" data-subj="Tamil" onclick="loadSubject('Tamil', this)">
        <span class="s-ico">T</span> தமிழ்
      </div>
    </div>
    <div id="subjectContent"></div>
  </div>
</div>

<script src="../js/main.js"></script>

    ]

      { n:'Photosynthesis', dur:'45 min', done:false },
      { n:'Human Body Systems', dur:'80 min', done:false },
      { n:'Environment & Ecology', dur:'55 min', done:false },

function loadSubject(subj, el) {
  document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  const d = subjectData[subj];
  document.getElementById('subjectContent').innerHTML = `
    <div class="subj-hero">
      <div class="subj-hero-icon">${d.icon}</div>
      <div>
        <h2>${d.title}</h2>
        <p>${d.desc}</p>
        <div class="subj-stats">
          <div class="subj-stat"><strong>${d.lessons}</strong>Lessons</div>
          <div class="subj-stat"><strong>${d.enrolled.toLocaleString()}</strong>Enrolled</div>
        </div>
      </div>
    </div>
    <div class="lessons-list">
      ${d.topics.map((t, i) => `
        <div class="lesson-item" onclick="${t.link ? `window.location.href='${t.link}'` : `showToast('▶ Opening: ${t.n}', 'success')`}">
          <div class="lesson-num">${i+1}</div>
          <div class="lesson-info">
            <h4>${t.n}</h4>
            <span>⏱ ${t.dur}</span>
          </div>
          <span class="lesson-icon">${t.done ? '✅' : '▶️'}</span>
        </div>`).join('')}
    </div>`;
    
}

loadSubject('math', document.querySelector('.sidebar-item'));
</script>
</body>
</html>
