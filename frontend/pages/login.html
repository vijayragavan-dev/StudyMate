<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="logo.png"/>
  <title>Login — StudyMate</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<nav class="navbar scrolled" id="navbar">
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">
      <span class="logo-icon">🌾</span>
      <span class="logo-text">StudyMate</span>
    </a>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome Back 👋</h2>
    <p class="sub">Sign in to continue your learning journey</p>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-submit">Login →</button>
    </form>
    <div class="auth-switch">
      Don't have an account? <a href="register.html">Register Free</a>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
</body>
</html>
