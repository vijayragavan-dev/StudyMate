# GramShiksha — Application Configuration
server.port=8080
spring.application.name=gramshiksha

# H2 In-Memory Database (Development)
spring.datasource.url=jdbc:h2:mem:gramshikshadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=gramshiksha_rural_education_secret_key_2024
jwt.expiry=86400000

# Logging
logging.level.com.rurallearn=INFO
logging.level.org.springframework.security=WARN

# CORS
spring.mvc.cors.allowed-origins=*

